app = "reny-birthday"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[[services]]
  protocol = "http"
  internal_port = 80

  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80

  [[services.ports]]
    port = 443

[[http_checks]]
  interval = "10s"
  timeout = "5s"
  grace = "60s"
